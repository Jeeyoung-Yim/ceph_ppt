<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceph 측정값 → PPT 자동 삽입</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --border: #e0ddd8;
    --text: #1a1a1a; --text-muted: #6b6860; --text-light: #9c9890;
    --accent: #8b3a3a; --accent-light: #f5eaea;
    --success: #2d6e4e; --success-bg: #eaf5f0; --success-border: #b5dece;
    --radius: 10px; --radius-sm: 6px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; justify-content: center;
    padding: 40px 16px 60px;
  }
  .wrap { width: 100%; max-width: 540px; }
  header { margin-bottom: 28px; }
  header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  header p { font-size: 13.5px; color: var(--text-muted); line-height: 1.5; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    background: var(--accent-light); color: var(--accent); margin-bottom: 10px;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.07em;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .step-badge {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--text-muted);
  }
  .dropzone {
    border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
    padding: 24px 16px; text-align: center; cursor: pointer;
    transition: all 0.15s; position: relative; background: var(--bg);
    min-height: 110px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
  }
  .dropzone:hover { background: #efefec; }
  .dropzone.done { border-color: var(--success-border); background: var(--success-bg); border-style: solid; }
  .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .dz-icon { font-size: 30px; color: var(--text-light); }
  .dropzone.done .dz-icon { display: none; }
  .dz-label { font-size: 14px; font-weight: 500; color: var(--text-muted); }
  .dz-done { font-size: 24px; display: none; color: var(--success); }
  .dropzone.done .dz-done { display: block; }
  .dropzone.done .dz-label { color: var(--success); }
  .btn {
    width: 100%; padding: 11px 16px; font-size: 14px; font-weight: 500;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: inherit; transition: background 0.15s;
  }
  .btn:hover:not(:disabled) { background: #f0efec; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-dl {
    border-color: var(--success-border);
    background: var(--success-bg); color: var(--success);
    display: none; margin-top: 10px;
  }
  .btn-dl.show { display: flex; }
  .log {
    background: #1e1e1e; border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 11.5px; font-family: 'SF Mono', Consolas, monospace;
    line-height: 1.6; max-height: 260px; overflow-y: auto; color: #ccc;
    margin-top: 12px; display: none;
  }
  .log.show { display: block; }
  .log .ok { color: #6fc89a; }
  .log .err { color: #f08080; }
  footer { margin-top: 16px; text-align: center; font-size: 11.5px; color: var(--text-light); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">교정과 분석 도구</div>
    <h1>Ceph 측정값 → PPT 자동 삽입</h1>
    <p>엑셀(.xls) 파일을 업로드하면 내장된 템플릿에<br>측정값이 자동으로 채워져요.</p>
  </header>

  <div class="card">
    <div class="card-title"><span class="step-badge">1</span> 엑셀 파일 업로드</div>
    <div class="dropzone" id="dz">
      <input type="file" accept=".xls,.xlsx" id="xls-input">
      <div class="dz-icon">📊</div>
      <div class="dz-label" id="xls-label">클릭하여 업로드 (.xls)</div>
      <div class="dz-done">✓</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="step-badge">2</span> 처리 및 다운로드</div>
    <button class="btn" id="btn-run" disabled>⚡ 값 삽입 시작</button>
    <button class="btn btn-dl" id="btn-dl">↓ 완성된 PPTX 다운로드</button>
    <div class="log" id="log"></div>
  </div>

  <footer>파일은 브라우저 안에서만 처리되며 외부 서버로 전송되지 않습니다.</footer>
</div>

<script>
(function() {
  'use strict';

  var xlsFile = null;
  var resultBlob = null;

  var dz = document.getElementById('dz');
  var xlsInput = document.getElementById('xls-input');
  var xlsLabel = document.getElementById('xls-label');
  var btnRun = document.getElementById('btn-run');
  var btnDl = document.getElementById('btn-dl');
  var logEl = document.getElementById('log');

  function log(msg, cls) {
    logEl.classList.add('show');
    var d = document.createElement('div');
    if (cls) d.className = cls;
    d.textContent = msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  xlsInput.addEventListener('change', function() {
    if (!xlsInput.files[0]) return;
    xlsFile = xlsInput.files[0];
    dz.classList.add('done');
    xlsLabel.textContent = xlsFile.name;
    btnRun.disabled = false;
  });

  dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.style.background = '#efefec'; });
  dz.addEventListener('dragleave', function() { dz.style.background = ''; });
  dz.addEventListener('drop', function(e) {
    e.preventDefault(); dz.style.background = '';
    if (!e.dataTransfer.files[0]) return;
    try { var dt = new DataTransfer(); dt.items.add(e.dataTransfer.files[0]); xlsInput.files = dt.files; } catch (err) {}
    xlsInput.dispatchEvent(new Event('change'));
  });

  function b64ToBytes(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  // ── 핵심 수정: <table>로 감싸서 파싱 ────────────────────────────
  function parseExcel(file) {
    return file.text().then(function(text) {
      // BOM 제거
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

      // <tr>로 시작하는 fragment를 DOMParser가 올바르게 파싱하려면
      // <table> 태그로 감싸야 함 (그렇지 않으면 tr이 테이블 밖으로 이동)
      var wrapped = '<html><body><table>' + text + '</table></body></html>';
      var doc = new DOMParser().parseFromString(wrapped, 'text/html');
      var rows = doc.querySelectorAll('tr.measurement-row');
      log('measurement-row: ' + rows.length + '개');

      var data = {};
      var rowNum = 3;
      for (var i = 2; i < rows.length; i++) {
        var tds = rows[i].querySelectorAll('td');
        if (tds.length < 8) continue;
        data[rowNum] = {
          b: tds[2].textContent.trim(),
          d: tds[4].textContent.trim(),
          e: tds[5].textContent.trim(),
          f: tds[6].textContent.trim(),
          g: tds[7].textContent.trim()
        };
        rowNum++;
      }
      return data;
    });
  }

  function getColor(val, mean, sev) {
    if (!sev) return 'FFFFFF';
    var v = parseFloat(val), m = parseFloat(mean);
    if (isNaN(v) || isNaN(m)) return 'FFFFFF';
    return v > m ? 'FF0000' : '1F497D';
  }

  function buildMapping() {
    var m = {};
    for (var i = 0; i < 8; i++) m[3+i] = i;
    for (i = 0; i < 7; i++) m[11+i] = 9+i;
    for (i = 0; i < 8; i++) m[18+i] = 18+i;
    for (i = 0; i < 2; i++) m[26+i] = 28+i;
    for (i = 0; i < 2; i++) m[28+i] = 31+i;
    return m;
  }

  function escXml(s) {
    return String(s)
      .split('&').join('&amp;')
      .split('<').join('&lt;')
      .split('>').join('&gt;')
      .split('"').join('&quot;');
  }

  function buildTxBody(value, color) {
    return '<a:txBody><a:bodyPr/><a:lstStyle/><a:p><a:pPr algn="ctr"/>' +
      '<a:r><a:rPr lang="en-US" altLang="ko-KR" sz="900" b="1" i="0" u="none" strike="noStrike" dirty="0">' +
      '<a:solidFill><a:srgbClr val="' + color + '"/></a:solidFill>' +
      '<a:effectLst/>' +
      '<a:latin typeface="Arial" panose="020B0604020202020204" pitchFamily="34" charset="0"/>' +
      '</a:rPr><a:t>' + escXml(value) + '</a:t></a:r></a:p></a:txBody>';
  }

  function replaceCellTxBody(cellXml, value, color) {
    var txBody = buildTxBody(value, color);
    var s = cellXml.indexOf('<a:txBody>');
    var e = cellXml.indexOf('</a:txBody>');
    if (s !== -1 && e !== -1) {
      return cellXml.substring(0, s) + txBody + cellXml.substring(e + 11);
    }
    var tcEnd = cellXml.lastIndexOf('</a:tc>');
    return cellXml.substring(0, tcEnd) + txBody + '</a:tc>';
  }

  function getNth(xml, n, openTag, closeTag) {
    var pos = 0, found = 0;
    while (pos < xml.length) {
      var s = xml.indexOf(openTag, pos);
      if (s === -1) break;
      var e = xml.indexOf(closeTag, s);
      if (e === -1) break;
      var endPos = e + closeTag.length;
      if (found === n) return { xml: xml.substring(s, endPos), start: s, end: endPos };
      found++;
      pos = endPos;
    }
    return null;
  }

  function replaceNth(xml, n, newContent, openTag, closeTag) {
    var info = getNth(xml, n, openTag, closeTag);
    if (!info) return xml;
    return xml.substring(0, info.start) + newContent + xml.substring(info.end);
  }

  function isSlideFile(name) {
    if (name.indexOf('ppt/slides/slide') !== 0) return false;
    if (name.indexOf('.xml', name.length - 4) === -1) return false;
    var rest = name.substring(16, name.length - 4);
    if (rest.length === 0) return false;
    for (var i = 0; i < rest.length; i++) {
      var c = rest.charCodeAt(i);
      if (c < 48 || c > 57) return false;
    }
    return true;
  }

  btnRun.addEventListener('click', async function() {
    btnRun.disabled = true;
    btnRun.textContent = '처리 중...';
    btnDl.classList.remove('show');
    logEl.innerHTML = '';
    resultBlob = null;

    try {
      log('▶ 엑셀 파싱');
      var excelData = await parseExcel(xlsFile);
      var cnt = Object.keys(excelData).length;
      log('  → ' + cnt + '개 항목', 'ok');
      if (cnt === 0) { log('  오류: 데이터를 읽지 못했습니다', 'err'); throw new Error('no data'); }

      var mapping = buildMapping();

      log('▶ 템플릿 로드');
      var b64 = document.getElementById('template-data').textContent.trim();
      var bytes = b64ToBytes(b64);
      var zip = await JSZip.loadAsync(bytes);

      var slideFiles = Object.keys(zip.files).filter(isSlideFile)
        .sort(function(a, b) {
          return parseInt(a.substring(16, a.length-4), 10) -
                 parseInt(b.substring(16, b.length-4), 10);
        });
      log('  슬라이드: ' + slideFiles.length + '개', 'ok');

      var totalInserted = 0;

      for (var si = 0; si < slideFiles.length; si++) {
        var slidePath = slideFiles[si];
        var xml = await zip.files[slidePath].async('string');
        if (xml.indexOf('<a:tbl>') === -1) continue;

        log('▶ ' + slidePath + ' 처리');
        var tblStart = xml.indexOf('<a:tbl>');
        var tblEnd = xml.indexOf('</a:tbl>') + 8;
        var tblXml = xml.substring(tblStart, tblEnd);

        var insertCount = 0;
        var mappingKeys = Object.keys(mapping);
        for (var ki = 0; ki < mappingKeys.length; ki++) {
          var exRow = parseInt(mappingKeys[ki], 10);
          var pptRow = mapping[exRow];
          if (!excelData[exRow]) continue;

          var row = excelData[exRow];
          var rowInfo = getNth(tblXml, pptRow, '<a:tr ', '</a:tr>');
          if (!rowInfo) continue;

          var cell2Info = getNth(rowInfo.xml, 2, '<a:tc>', '</a:tc>');
          var cell3Info = getNth(rowInfo.xml, 3, '<a:tc>', '</a:tc>');
          if (!cell2Info || !cell3Info) continue;

          var colorD = getColor(row.d, row.b, row.e);
          var colorF = getColor(row.f, row.b, row.g);
          var newCell2 = replaceCellTxBody(cell2Info.xml, row.d, colorD);
          var newCell3 = replaceCellTxBody(cell3Info.xml, row.f, colorF);

          var newRow = replaceNth(rowInfo.xml, 2, newCell2, '<a:tc>', '</a:tc>');
          newRow = replaceNth(newRow, 3, newCell3, '<a:tc>', '</a:tc>');
          tblXml = replaceNth(tblXml, pptRow, newRow, '<a:tr ', '</a:tr>');
          insertCount++;
        }

        xml = xml.substring(0, tblStart) + tblXml + xml.substring(tblEnd);
        zip.file(slidePath, xml);
        totalInserted += insertCount;
        log('  ✓ ' + insertCount + '행 삽입', 'ok');
      }

      log('━━━━━━━━━━━━━━━━━━━━━━━━━');
      log('총 ' + totalInserted + '행 완료', 'ok');

      resultBlob = await zip.generateAsync({
        type: 'blob',
        mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation',
        compression: 'DEFLATE'
      });
      log('✓ 완료 (' + resultBlob.size + ' bytes)', 'ok');
      btnDl.classList.add('show');

    } catch (err) {
      if (err.message !== 'no data') log('오류: ' + err.message, 'err');
    }

    btnRun.disabled = !xlsFile;
    btnRun.textContent = '⚡ 다시 실행';
  });

  btnDl.addEventListener('click', function() {
    if (!resultBlob) return;
    var url = URL.createObjectURL(resultBlob);
    var a = document.createElement('a');
    a.href = url; a.download = 'output_filled.pptx';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  });
})();
</script>
</body>
